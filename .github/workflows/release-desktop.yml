name: Release desktop app

# Builds the Electron desktop app for macOS (.dmg, Apple Silicon) and Windows
# (.exe), with the FastAPI backend frozen in as a PyInstaller sidecar so users get
# a double-click install with no Python/venv required.
#
# Intel macOS (macos-13) is intentionally not built: GitHub is retiring those
# runners and they queue for hours or never pick up, hanging every release. arm64
# is the current majority; true Intel support would need a universal sidecar.
#
# Linux is deliberately NOT built here — it ships as the lighter python-appimage
# build in release-appimage.yml. Keeping one Linux artifact avoids attaching two
# competing AppImages to the same release.
#
#   tag v* → attach installers to the GitHub Release
#   manual (workflow_dispatch) → upload as CI artifacts only
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false          # one OS failing must not abort the others
      matrix:
        include:
          - os: macos-14         # Apple Silicon (arm64)
          - os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python deps + PyInstaller
        run: python -m pip install --upgrade pip -r requirements.txt pyinstaller

      - name: Build the UI
        # Lockfiles are gitignored (repo convention), so `npm ci` has nothing to
        # install from on a fresh checkout — fall back to `npm install`, matching
        # packaging/build-appimage.sh which the Linux build already uses.
        run: |
          npm --prefix ui ci || npm --prefix ui install
          npm --prefix ui run build

      - name: Freeze the backend sidecar
        shell: bash
        run: bash desktop/build-sidecar.sh

      - name: Smoke-test the frozen sidecar
        # Actually RUN the frozen exe and wait for /health — build-sidecar.sh only
        # proves it was produced, not that it boots. Import-time platform crashes
        # (Windows-only Unix imports, cp1252 encode errors on emoji logging) pass
        # the freeze but kill the app on a real machine; this catches them in CI
        # before the installer is ever attached. No PYTHONUTF8 here on purpose —
        # the frozen server must be self-sufficient (see packaging/server_entry.py).
        shell: bash
        run: |
          set -euo pipefail
          BIN=desktop/backend/amagra-server
          [ -f "$BIN.exe" ] && BIN="$BIN.exe"
          "$BIN" --host 127.0.0.1 --port 8000 > sidecar-smoke.log 2>&1 &
          PID=$!
          ok=0
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:8000/health > /dev/null 2>&1; then ok=1; break; fi
            if ! kill -0 "$PID" 2>/dev/null; then break; fi   # process died
            sleep 2
          done
          kill "$PID" 2>/dev/null || true
          echo "===== sidecar-smoke.log ====="; cat sidecar-smoke.log || true
          if [ "$ok" != 1 ]; then
            echo "::error::frozen sidecar did not become healthy — see log above"
            exit 1
          fi
          echo "✓ frozen sidecar booted and /health returned 200"

      - name: Build the desktop app
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No signing certs in CI — tell electron-builder not to hunt for an
          # identity (which otherwise fails the macOS build). Builds are unsigned;
          # users see a Gatekeeper/SmartScreen prompt on first launch until we add
          # signing. See docs/ops/RELEASING.md.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: |
          npm ci || npm install
          npx electron-builder --publish never

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: amagra-desktop-${{ matrix.os }}
          path: |
            desktop/dist/*.dmg
            desktop/dist/*.exe
          if-no-files-found: warn

      - name: Attach to release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/dist/*.dmg
            desktop/dist/*.exe
          fail_on_unmatched_files: false
