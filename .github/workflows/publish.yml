name: Publish Docker image

# Publishes a multi-arch image to Docker Hub when a version tag is pushed.
# CI (ci.yml) only build-validates (push: false); this is the actual release path.
#
# One-time setup (repo → Settings → Secrets and variables → Actions):
#   DOCKERHUB_USERNAME  your Docker Hub username (d4shm1r)
#   DOCKERHUB_TOKEN     a Docker Hub access token (Account Settings → Security)
#
# To release:  git tag v1.2.0 && git push origin v1.2.0
# Produces:    d4shm1r/amagra:1.2.0  and  d4shm1r/amagra:latest  (linux/amd64)
#
# amd64-only on purpose: the arm64 leg was built under QEMU emulation and cost
# ~9 of the ~11 min. Dropping it takes the publish to ~2 min. To bring arm64
# back *fast*, build it natively on an `ubuntu-24.04-arm` runner via a matrix
# + manifest merge rather than re-adding QEMU emulation here.

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    name: Build and push to Docker Hub
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Derive tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: d4shm1r/amagra
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
