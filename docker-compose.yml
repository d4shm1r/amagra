version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: agentic-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # GPU passthrough (remove deploy block if no NVIDIA GPU)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  api:
    build: .
    container_name: agentic-api
    ports:
      - "8000:8000"
    volumes:
      - ./memory:/app/memory
      - ./logs:/app/logs
      # Single-file mode: one volume holds the consolidated amagra.db (+ FAISS
      # sidecar). Harmless to keep mounted in the default separate-file mode.
      - ./data:/app/data
    environment:
      - REQUIRE_AUTH=${REQUIRE_AUTH:-0}
      - ADMIN_TOKEN=${ADMIN_TOKEN:-}
      - OLLAMA_HOST=http://ollama:11434
      # Single-file DB mode (optional): set AMAGRA_DB=/app/data/amagra.db to
      # collapse every SQLite store into the ./data volume above. Empty/unset
      # keeps the default separate-file layout under ./memory + ./logs. Migrate
      # existing data first with workbench/scripts/migrate_to_single_db.py.
      - AMAGRA_DB=${AMAGRA_DB:-}
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped

  ui:
    image: node:20-alpine
    container_name: agentic-ui
    working_dir: /app
    command: sh -c "npm install && npm run build && npx serve -s build -l 3000"
    ports:
      - "3000:3000"
    volumes:
      - ./ui:/app
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    depends_on:
      - api
    restart: unless-stopped

volumes:
  ollama_data:
