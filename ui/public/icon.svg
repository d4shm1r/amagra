<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="AMAGRA">
  <title>AMAGRA</title>
  <defs>
    <!-- gold ramp, matching the AMAGRA title wordmark -->
    <linearGradient id="amagra-gold" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%"   stop-color="#FFE880"/>
      <stop offset="28%"  stop-color="#DEB838"/>
      <stop offset="55%"  stop-color="#C48808"/>
      <stop offset="80%"  stop-color="#9A6C00"/>
      <stop offset="100%" stop-color="#6C4C00"/>
    </linearGradient>
    <!-- warm-umber tile -->
    <linearGradient id="amagra-tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#2A1D0C"/>
      <stop offset="100%" stop-color="#160F05"/>
    </linearGradient>
  </defs>

  <!-- rounded tile + thin gold ring: gives the favicon a solid, high-contrast
       shape so the gold wordmark reads on any browser-tab background -->
  <rect x="0" y="0" width="512" height="512" rx="116" fill="url(#amagra-tile)"/>
  <rect x="7" y="7" width="498" height="498" rx="110" fill="none"
        stroke="#C48808" stroke-opacity="0.24" stroke-width="3"/>

  <!-- AMAGRA wordmark in gold serif. textLength pins the width so it renders
       the same whether or not Cormorant Garamond is installed — favicons are
       drawn by browser chrome, which won't load the app web font. The width
       (420 of 512) leaves a deliberate margin so the mark stays icon-usable
       rather than edge-to-edge. -->
  <text x="256" y="294" text-anchor="middle"
        textLength="420" lengthAdjust="spacingAndGlyphs"
        font-family="'Cormorant Garamond','Cormorant',Georgia,'Times New Roman',serif"
        font-size="112" font-weight="700"
        fill="url(#amagra-gold)">AMAGRA</text>
</svg>
