<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" role="img" aria-label="AMAGRA">
  <title>AMAGRA</title>
  <defs>
    <linearGradient id="amagra-gold" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%"   stop-color="#FFE880"/>
      <stop offset="28%"  stop-color="#DEB838"/>
      <stop offset="55%"  stop-color="#C48808"/>
      <stop offset="80%"  stop-color="#9A6C00"/>
      <stop offset="100%" stop-color="#6C4C00"/>
    </linearGradient>
  </defs>
  <!-- AMAGRA wordmark in gold. textLength pins the width so it renders the
       same whether or not Cormorant Garamond is installed (favicons are drawn
       by browser chrome, which won't load the app's web font). -->
  <text x="360" y="170" text-anchor="middle"
        textLength="640" lengthAdjust="spacingAndGlyphs"
        font-family="'Cormorant Garamond','Cormorant',Georgia,'Times New Roman',serif"
        font-size="168" font-weight="600"
        fill="url(#amagra-gold)">AMAGRA</text>
</svg>
