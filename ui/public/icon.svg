<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Amagra">
  <title>Amagra</title>
  <defs>
    <!-- 5-step gold ramp, matching the wordmark (g1..g5) -->
    <linearGradient id="amagra-gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#FFE880"/>
      <stop offset="28%"  stop-color="#DEB838"/>
      <stop offset="55%"  stop-color="#C48808"/>
      <stop offset="80%"  stop-color="#9A6C00"/>
      <stop offset="100%" stop-color="#6C4C00"/>
    </linearGradient>
    <!-- warm-umber tile -->
    <linearGradient id="amagra-tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#2A1D0C"/>
      <stop offset="100%" stop-color="#160F05"/>
    </linearGradient>
    <!-- apex spark (the brand dot) -->
    <radialGradient id="amagra-spark" cx="42%" cy="36%" r="62%">
      <stop offset="0%"   stop-color="#FFF6CE"/>
      <stop offset="50%"  stop-color="#FFE880"/>
      <stop offset="100%" stop-color="#DEB838"/>
    </radialGradient>
  </defs>

  <!-- tile + thin gold ring -->
  <rect x="0" y="0" width="512" height="512" rx="116" fill="url(#amagra-tile)"/>
  <rect x="7" y="7" width="498" height="498" rx="110" fill="none"
        stroke="#C48808" stroke-opacity="0.24" stroke-width="3"/>

  <!-- the A: two legs + crossbar, apex meets the spark -->
  <g fill="none" stroke="url(#amagra-gold)" stroke-width="46"
     stroke-linecap="round" stroke-linejoin="round">
    <path d="M148 382 L256 170"/>
    <path d="M256 170 L364 382"/>
    <path d="M189 302 L323 302"/>
  </g>

  <!-- apex spark, with a soft glow -->
  <circle cx="256" cy="152" r="52" fill="#FFE880" opacity="0.18"/>
  <circle cx="256" cy="152" r="34" fill="url(#amagra-spark)"/>
</svg>
